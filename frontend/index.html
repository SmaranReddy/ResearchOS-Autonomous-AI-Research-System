<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReSearch AI Assistant</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f1117;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 60px 16px;
    }

    .container {
      width: 100%;
      max-width: 720px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 600;
      color: #f8fafc;
      margin-bottom: 32px;
      letter-spacing: -0.3px;
    }

    /* --- Input row --- */
    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 32px;
    }

    input[type="text"] {
      flex: 1;
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 0.95rem;
      padding: 12px 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]::placeholder { color: #64748b; }
    input[type="text"]:focus { border-color: #6366f1; }

    button {
      background: #6366f1;
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 500;
      padding: 12px 24px;
      transition: background 0.2s;
      white-space: nowrap;
    }
    button:hover  { background: #4f52d4; }
    button:active { background: #4348c0; }
    button:disabled { background: #3b3f60; cursor: not-allowed; }

    /* --- Result card --- */
    #result {
      display: none;
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 10px;
      padding: 24px;
      animation: fadeIn 0.35s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0);   }
    }

    /* --- Confidence section --- */
    .confidence-label {
      font-size: 0.8rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 8px;
    }

    .confidence-value {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .bar-track {
      background: #2d3148;
      border-radius: 99px;
      height: 8px;
      overflow: hidden;
      margin-bottom: 24px;
    }

    .bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.5s ease, background 0.5s ease;
    }

    /* --- Answer section --- */
    .answer-label {
      font-size: 0.8rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 10px;
    }

    #answer-text {
      font-size: 0.95rem;
      line-height: 1.75;
      color: #cbd5e1;
      white-space: pre-wrap;
    }

    /* --- Loading spinner --- */
    #loading {
      display: none;
      align-items: center;
      gap: 10px;
      color: #64748b;
      font-size: 0.9rem;
      margin-bottom: 16px;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid #2d3148;
      border-top-color: #6366f1;
      border-radius: 50%;
      flex-shrink: 0;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-dots::after {
      content: "";
      animation: dots 1.2s steps(4, end) infinite;
    }
    @keyframes dots {
      0%  { content: "";    }
      25% { content: ".";   }
      50% { content: "..";  }
      75% { content: "..."; }
    }

    /* --- Error --- */
    #error {
      display: none;
      color: #f87171;
      font-size: 0.9rem;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>ReSearch AI Assistant</h1>

    <div class="input-row">
      <input
        type="text"
        id="query-input"
        placeholder="Ask a research question…"
        autocomplete="off"
      />
      <button id="submit-btn" onclick="submitQuery()">Search</button>
    </div>

    <div id="loading"><div class="spinner"></div><span class="loading-dots">Searching</span></div>
    <div id="error"></div>

    <div id="result">
      <div class="confidence-label">Confidence</div>
      <div class="confidence-value" id="confidence-value">—</div>
      <div class="bar-track">
        <div class="bar-fill" id="bar-fill" style="width:0%"></div>
      </div>

      <div class="answer-label">Answer</div>
      <div id="answer-text"></div>
    </div>
  </div>

  <script>
    const input   = document.getElementById("query-input");
    const btn     = document.getElementById("submit-btn");
    const loading = document.getElementById("loading");
    const error   = document.getElementById("error");
    const result  = document.getElementById("result");

    // Submit on Enter key
    input.addEventListener("keydown", e => { if (e.key === "Enter") submitQuery(); });

    function barColor(c) {
      if (c < 0.4) return "#ef4444";   // red
      if (c < 0.7) return "#f97316";   // orange
      return "#22c55e";                 // green
    }

    async function submitQuery() {
      const query = input.value.trim();
      if (!query) return;

      // reset UI
      error.style.display   = "none";
      result.style.display  = "none";
      loading.style.display = "flex";
      btn.disabled = true;

      try {
        const res = await fetch("http://127.0.0.1:8000/query", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ query }),
        });

        if (!res.ok) throw new Error(`Server error: ${res.status}`);

        const data = await res.json();
        const conf = typeof data.confidence === "number" ? data.confidence : 0;

        document.getElementById("confidence-value").textContent =
          `${(conf * 100).toFixed(0)}%  (${conf.toFixed(2)})`;

        // Reset bar to 0 instantly (no transition), then animate to target
        const fill = document.getElementById("bar-fill");
        fill.style.transition = "none";
        fill.style.width      = "0%";
        // Force reflow so the reset is painted before re-enabling transition
        fill.getBoundingClientRect();
        fill.style.transition = "width 0.6s ease, background 0.4s ease";
        fill.style.width      = `${Math.min(conf * 100, 100)}%`;
        fill.style.background = barColor(conf);

        document.getElementById("answer-text").textContent =
          data.answer || "(no answer returned)";

        result.style.display = "block";
        // Scroll result into view smoothly
        result.scrollIntoView({ behavior: "smooth", block: "nearest" });

      } catch (err) {
        error.textContent    = `Error: ${err.message}`;
        error.style.display  = "block";
      } finally {
        loading.style.display = "none";
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>

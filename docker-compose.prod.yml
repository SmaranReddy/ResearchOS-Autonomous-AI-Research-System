version: "3.9"

# ── Production compose — full source baked in, no volume mounts ─────────────
#
#   docker compose -f docker-compose.prod.yml up --build
#
# Both services run optimized builds without hot reload.

services:

  # ── FastAPI backend ──────────────────────────────────────────────────────
  backend:
    build:
      context: .                      # root — so requirements.txt is reachable
      dockerfile: backend/Dockerfile
      target: prod                    # copies source into image, 2 uvicorn workers
    ports:
      - "8000:8000"
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s              # prod workers take slightly longer to initialise
    restart: always

  # ── Next.js frontend ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend-next
      dockerfile: Dockerfile
      target: prod                    # runs npm run build inside image then next start
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy    # wait until backend passes health probe
    restart: always
